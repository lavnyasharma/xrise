version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express API) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/helpdesk
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_EXPIRES_IN: 1d
      SEED_AGENT_PASSWORD: ${SEED_AGENT_PASSWORD:-Agent@12345}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
      CORS_ORIGINS: http://localhost,http://localhost:80
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 30
      LOG_LEVEL: info

  # ── Frontend (Nginx + Vite build) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
